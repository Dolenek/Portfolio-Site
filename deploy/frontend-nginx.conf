server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/plain
    text/xml;

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /skills/ {
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    add_header Content-Type application/json;
    return 200 '{"ok":true,"service":"portfolio-frontend"}';
  }
}
