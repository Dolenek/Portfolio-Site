services:
  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    env_file:
      - ../api/.env
