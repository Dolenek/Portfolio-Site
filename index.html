<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        const storedTheme = localStorage.getItem("portfolio-site-theme");
        const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        if (storedTheme === "dark" || (!storedTheme && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      } catch {
        /* Keep first paint resilient when storage is unavailable. */
      }
    </script>
    <link rel="icon" type="image/png" href="/assets/generated/brand/favicon-32.png" />
